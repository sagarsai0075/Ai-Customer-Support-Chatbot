<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>AI Chatbox</title>
	<link rel="icon" type="image/x-icon" href="assets/ChatBox.ico" />
	<link rel="stylesheet" href="css/style.css" />
</head>
<body>
	<main class="chat-app">
		<header class="chat-header">
			<div class="chat-title">
				<img src="assets/ChatBox.ico" alt="Chatbox avatar" class="title-avatar" />
				<h1>Chatbox</h1>
			</div>
			<p>Ask a question and get instant help.</p>
		</header>

		<section id="chat-box" class="chat-box" aria-live="polite"></section>

		<form id="chat-form" class="chat-form">
			<input
				id="message-input"
				type="text"
				placeholder="Type your message..."
				autocomplete="off"
				required
			/>
			<button type="submit">Send</button>
		</form>
	</main>

	<script src="js/chat.js"></script>
</body>
</html>
